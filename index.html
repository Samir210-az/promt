<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Promt.AI — Zarafatcıl Prompt Generatoru</title>
<meta name="description" content="Sadə fikrini yaz, Promt.AI zarafat eləsin və sənə hərtərəfli, qənaətverici AI promtu hazırlasın.">
<meta name="theme-color" content="#1a0505">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
:root{
  --bordo:#6A0000;
  --bordo-light:#8a1a1a;
  --gold:#D2A55D;
  --teal:#2A9D8F;
  --ink:#15090a;
  --paper:#fbf3e7;
  --muted:#caa792;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;height:100%;}
body{
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  background:radial-gradient(ellipse at top, #2a0a0a 0%, #15090a 55%, #0b0506 100%);
  color:var(--paper);
  min-height:100vh;
  min-height:100dvh;
  max-width:100vw;
  overflow-x:hidden;
  position:relative;
  display:flex;
  flex-direction:column;
}
@media (prefers-reduced-motion: reduce){
  *{animation-duration:0.01ms !important; transition-duration:0.01ms !important;}
}

/* Parallax decorative layers */
.bg-layer{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.orb{position:absolute;border-radius:50%;filter:blur(60px);opacity:.35;}
.orb1{width:420px;height:420px;background:var(--bordo);top:-100px;left:-100px;}
.orb2{width:380px;height:380px;background:var(--teal);bottom:-120px;right:-80px;opacity:.25;}
.orb3{width:260px;height:260px;background:var(--gold);top:40%;left:60%;opacity:.18;}

.grain{position:fixed;inset:0;background-image:radial-gradient(rgba(255,255,255,.025) 1px, transparent 1px);background-size:3px 3px;pointer-events:none;z-index:1;}

header{
  position:relative;z-index:2;
  text-align:center;
  padding:28px 16px 18px;
  flex-shrink:0;
}
.brand-logo{
  height:48px;width:auto;max-width:70vw;
  margin-bottom:14px;
  padding:8px 14px;
  background:rgba(251,243,231,.94);
  border-radius:12px;
  filter:drop-shadow(0 6px 18px rgba(0,0,0,.5)) brightness(1.05) saturate(1.15);
  box-shadow:0 8px 24px rgba(0,0,0,.4), 0 0 0 1px rgba(210,165,93,.3);
  animation:logoIn .7s ease both;
}
@keyframes logoIn{from{opacity:0;transform:translateY(-10px) scale(.94);}to{opacity:1;transform:translateY(0) scale(1);}}
.eyebrow{
  display:inline-block;
  font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;
  color:var(--gold);border:1px solid rgba(210,165,93,.4);
  padding:6px 14px;border-radius:999px;
  background:rgba(210,165,93,.08);
  margin-bottom:14px;
}
h1{
  font-size:clamp(2.2rem,8.5vw,3.4rem);
  font-weight:800;
  line-height:1.05;
  letter-spacing:-.01em;
  background:linear-gradient(120deg, var(--paper) 20%, var(--gold) 60%, var(--teal) 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  margin-bottom:12px;
}
.sub{
  max-width:560px;margin:0 auto;
  color:var(--muted);
  font-size:.98rem;line-height:1.5;
}

main{position:relative;z-index:2;max-width:760px;width:100%;margin:0 auto;padding:0 16px;flex:1 1 auto;display:flex;flex-direction:column;justify-content:center;min-height:0;overflow-y:auto;}

.card{
  background:linear-gradient(160deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
  border:1px solid rgba(210,165,93,.18);
  border-radius:20px;
  padding:28px;
  backdrop-filter:blur(10px);
  box-shadow:0 20px 60px -20px rgba(0,0,0,.6);
  transition:transform .4s ease, box-shadow .4s ease;
}
.card:hover{transform:translateY(-2px);}

.field-label{font-size:.78rem;color:var(--gold);letter-spacing:.05em;text-transform:uppercase;margin-bottom:10px;display:block;}

textarea{
  width:100%;min-height:120px;resize:vertical;
  background:rgba(0,0,0,.25);
  border:1px solid rgba(255,255,255,.1);
  border-radius:13px;
  padding:16px;color:var(--paper);font-size:1rem;line-height:1.5;
  font-family:inherit;
  transition:border-color .25s ease, box-shadow .25s ease;
}
textarea:focus{
  outline:none;border-color:var(--teal);
  box-shadow:0 0 0 3px rgba(42,157,143,.2);
}
textarea::placeholder{color:rgba(250,243,231,.35);}

.row{display:flex;gap:14px;flex-wrap:wrap;margin-top:18px;align-items:center;width:100%;}

select{
  background:rgba(0,0,0,.3);color:var(--paper);
  border:1px solid rgba(255,255,255,.12);
  border-radius:11px;padding:12px 16px;font-size:.92rem;
  font-family:inherit;
  max-width:100%;
  min-width:0;
  flex:1 1 220px;
}

.btn{
  position:relative;overflow:hidden;
  border:none;cursor:pointer;
  background:linear-gradient(120deg, var(--bordo), var(--bordo-light));
  color:var(--paper);
  font-weight:700;font-size:1.02rem;
  padding:15px 28px;border-radius:14px;
  box-shadow:0 10px 30px -10px rgba(106,0,0,.7);
  transition:transform .2s ease, box-shadow .2s ease;
  flex:1;min-width:160px;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 14px 36px -8px rgba(106,0,0,.85);}
.btn:active{transform:translateY(0);}
.btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(120deg, transparent, rgba(255,255,255,.25), transparent);
  transform:translateX(-120%);
}
.btn:hover::after{transform:translateX(120%);transition:transform .6s ease;}
.btn[disabled]{opacity:.55;cursor:not-allowed;transform:none !important;}

.btn-ghost{
  background:transparent;border:1px solid rgba(210,165,93,.4);
  color:var(--gold);padding:15px 22px;border-radius:14px;cursor:pointer;
  font-weight:600;font-size:.92rem;
  transition:background .25s ease, transform .2s ease;
}
.btn-ghost:hover{background:rgba(210,165,93,.1);transform:translateY(-2px);}

/* Joke bubble */
#joke-zone{margin-top:14px;min-height:1px;flex-shrink:0;}
.joke-bubble{
  position:relative;
  background:linear-gradient(135deg, rgba(42,157,143,.16), rgba(42,157,143,.05));
  border:1px solid rgba(42,157,143,.35);
  border-radius:14px;padding:12px 16px;
  font-size:.85rem;color:#cdeee9;
  opacity:0;transform:translateY(10px) scale(.98);
  animation:popIn .5s cubic-bezier(.2,.9,.3,1.2) forwards;
}
.joke-bubble .tag{display:block;font-size:.62rem;color:var(--teal);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;}
@keyframes popIn{to{opacity:1;transform:translateY(0) scale(1);}}

/* Result */
#result-zone{margin-top:14px;margin-bottom:14px;flex-shrink:0;}
.result-card{
  background:rgba(0,0,0,.35);
  border:1px solid rgba(210,165,93,.3);
  border-radius:16px;padding:18px;
  white-space:pre-wrap;line-height:1.6;font-size:.88rem;
  position:relative;
  opacity:0;animation:fadeUp .5s ease forwards;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.copy-btn{
  position:absolute;top:14px;right:14px;
  background:rgba(210,165,93,.15);color:var(--gold);
  border:1px solid rgba(210,165,93,.4);
  border-radius:10px;padding:6px 12px;font-size:.78rem;cursor:pointer;
  transition:background .2s ease;
}
.copy-btn:hover{background:rgba(210,165,93,.3);}

.loader{
  display:flex;gap:6px;align-items:center;justify-content:center;
  padding:30px 0;
}
.dot{width:10px;height:10px;border-radius:50%;background:var(--gold);animation:bounce 1.1s infinite ease-in-out;}
.dot:nth-child(2){animation-delay:.15s;background:var(--teal);}
.dot:nth-child(3){animation-delay:.3s;background:var(--bordo-light);}
@keyframes bounce{0%,80%,100%{transform:scale(.6);opacity:.5;}40%{transform:scale(1.15);opacity:1;}}

footer{
  position:relative;z-index:2;
  text-align:center;padding:10px 16px;
  color:var(--muted);font-size:.78rem;
  border-top:1px solid rgba(255,255,255,.06);
  flex-shrink:0;
}
footer a{color:var(--gold);text-decoration:none;font-weight:600;}
footer a:hover{text-decoration:underline;}
.footer-line{display:flex;justify-content:center;align-items:center;gap:8px;flex-wrap:wrap;}
.footer-line svg{vertical-align:-3px;}

@media (max-width:480px){
  header{padding:14px 14px 8px;}
  .card{padding:14px;border-radius:16px;}
  .row{flex-direction:column;}
  .btn{width:100%;}
  select{width:100%;flex:none;}
}
@media (max-height:700px){
  .brand-logo{height:26px;margin-bottom:6px;}
  .eyebrow{display:none;}
  h1{font-size:clamp(1.4rem,6vw,2rem);margin-bottom:4px;}
  .sub{font-size:.74rem;line-height:1.25;}
  textarea{min-height:48px;}
}
</style>
</head>
<body>

<div class="bg-layer" id="bgLayer">
  <div class="orb orb1" data-speed="0.15"></div>
  <div class="orb orb2" data-speed="0.25"></div>
  <div class="orb orb3" data-speed="0.4"></div>
</div>
<div class="grain"></div>

<header>
  <img src="logo.png" alt="Security Group" class="brand-logo">
  <span class="eyebrow">AZƏRBAYCAN 🇦🇿</span>
  <h1>Promt.AI</h1>
  <p class="sub">Fikrini necə yazırsansa elə yaz — qısa, dağınıq, sadə formada. Promt.AI əvvəlcə bir zarafat eləsin, sonra sənə hərtərəfli, qənaətverici AI promtu hazırlasın.</p>
</header>

<main>
  <div class="card">
    <label class="field-label" for="userInput">Sənin fikrin</label>
    <textarea id="userInput" placeholder="Məs: bir veb sayt üçün promt yaz, gözəl olsun də..."></textarea>

    <div class="row">
      <select id="targetModel">
        <option value="ümumi">🎯 Ümumi AI üçün (ChatGPT/Claude/Gemini)</option>
        <option value="şəkil">🖼️ Şəkil generatoru üçün (Midjourney/DALL·E)</option>
        <option value="kod">💻 Kod yazımı üçün</option>
        <option value="video">🎬 Video/animasiya üçün</option>
        <option value="reels">📱 Reels / Story / Sosial media üçün</option>
        <option value="yazı">✍️ Mətn/məzmun yazımı üçün</option>
      </select>
      <select id="tone">
        <option value="peşəkar">Peşəkar ton</option>
        <option value="yaradıcı">Yaradıcı ton</option>
        <option value="sadə">Sadə ton</option>
      </select>
    </div>

    <div class="row">
      <button class="btn" id="generateBtn">✨ Promtu Yarat</button>
      <button class="btn-ghost" id="clearBtn">Təmizlə</button>
    </div>
  </div>

  <div id="joke-zone"></div>
  <div id="result-zone"></div>
</main>

<footer>
  <div class="footer-line">
    <span>By <a href="https://instagram.com/s_akhundoff" target="_blank" rel="noopener">s_akhundoff</a></span>
    <a href="https://instagram.com/s_akhundoff" target="_blank" rel="noopener" aria-label="Instagram">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor"/></svg>
    </a>
  </div>
</footer>

<script src="app.js"></script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').then(reg=>{
      reg.update();
      reg.addEventListener('updatefound', ()=>{
        const newSW = reg.installing;
        newSW.addEventListener('statechange', ()=>{
          if(newSW.state === 'activated'){
            window.location.reload();
          }
        });
      });
    }).catch(()=>{});
  });
  let refreshed = false;
  navigator.serviceWorker.addEventListener('controllerchange', ()=>{
    if(refreshed) return;
    refreshed = true;
    window.location.reload();
  });
}
</script>
</body>
</html>
